<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-App</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url("images/bg3.png");
            background-position: center;
            background-size: cover;
        }
        .box{
            height: 418px;
            width: 400px;
            border: 6px rgb(78, 73, 73) solid;
            border-radius: 20px;
            background-color: rgb(165, 213, 255);
        }
        
        .col{
            padding-top: 2px;
            height: 130px;
            width: 395px;
            border-radius: 25px;
            display: flex;
            flex-direction: row;
            margin-bottom: 8px;
        }
        .row{
            height: 125px;
            width: 215px;
            border: 5px rgb(89, 163, 223) solid;
            border-radius: 23px;
            padding-left: 25px;
            margin-left: 3px;
             
        }

        h3{
            font-size: x-large;
        }

         input{
            height: 42px;
            width: 261px;
            border:3px black solid;
            border-radius: 15px;
            padding-left: 0px;
            font-size: 19px;
            font-weight: bold;
         }
         input:hover{
            background-color: burlywood;
         }
         .searchbar{
            height: 50px;
            width: 400px;
            display: flex;
            flex-direction: row;
            margin-top: 0px;
            margin-bottom: 5px;
             
         }
         button{
            height: 42 px;
            width: 135px;
            background-color: black;
            border:3px black solid;
            border-radius: 15px;
            color: azure;
            font-size: 20px;
            font-weight: bold;
         }
         button:hover{
            background-color: blue;
         }
         h1{
            margin-top: 0%;
            height: 52px;
            width: 250px;
            font-size: 40px;
            background-color: bisque;
            color: black;
            border: 5px rgb(250, 159, 21) solid;
            border-radius: 15px;
            text-align: center;
         }
    </style>
</head>
<body>
    <h1>Weather-App</h1>
    <div class="searchbar">
    <input type="text" placeholder="Enter Your City Name ">
    <button>ENTER</button>
    </div>
    <div class="box">
         <div class="col" id="colone">
            <div class="row" >
                <h2>Temprature🌞</h2>
                <h3 id="temp"> </h3>
            </div>
            <div class="row" >
                <h2>Feels Like 🌨️</h2>
                <h3 id="feellike"> </h3>
            </div>
         </div>
         <div class="col" id="coltwo">
             <div class="row" >
                <h2>Pressure🌡️🌡️</h2>
                <h3 id="pressure"> </h3>
            </div>
            <div class="row" >
                <h2>Sea Level</h2>
                <h3 id="sealevel"> </h3>
            </div>
         </div>
         <div class="col">
             <div class="row" >
                <h2>Humidity 🌨️</h2>
                <h3 id="humidity"> </h3>
            </div>
             <div class="row" >
                <h2>Wind Speed🚅</h2>
                <h3 id="windspeed"> </h3>
            </div>
         </div>
         
    </div>

    <script>
       
        let inpt=document.querySelector("input");
        let btn=document.querySelector("button");
        let txt=document.querySelector("h2");

        let Temperature=document.getElementById("temp");
        let  feel=document.getElementById("feellike");
        let  pres=document.getElementById("pressure");
        let sea=document.getElementById("sealevel");
        let  humid=document.getElementById("humidity");
        let winds=document.getElementById("windspeed");

        btn.addEventListener("click",()=>{
        let city=inpt.value;
        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=dbe2c0348b53deca981f9814a3b6d4c7&units=metric`)
        .then((Response)=>Response.json())
        .then((data)=>{
            Temperature.innerText=data.main.temp + " C";
            feel.innerText=data.main.feels_like +" C";;
            pres.innerText=data.main.pressure +" Pa";
            sea.innerText = data.main.sea_level ? data.main.sea_level + " hPa" : "N/A";

            humid.innerText=data.main.humidity +" %";
            winds.innerText=data.wind.speed +" m/s";
        });
    });
    
    
    </script>
    
</body>
</html>
